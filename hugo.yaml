baseURL: "https://mikeditton.ch"
title: Mike Ditton
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  mainSections: ["learning", "projects", "baseball"]
  description: "DevOps engineer, baseball player, and digital minimalist sharing insights on technology and life."
  keywords: [Blog, Portfolio, PaperMod]
  author: Mike Ditton
  # author: ["Me", "You"] # multiple authors
  images: ["/images/me.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set

  # home-info mode
  homeInfoParams:
    Title: "Hi there 👋"
    Content: |
      Welcome to my blog! I'm Mike Ditton, a DevOps engineer with a passion for both the technical world of IT and the exhilarating game of baseball. Here, you'll find a unique blend of content that ranges from my professional insights, to personal anecdotes from the outfield and beyond. Whether you're here for tech tips, to hear about my latest projects, or just to share in my journey as I explore the intricate dance of pitching, I'm glad you stopped by. Dive in and enjoy the stories, experiences, and lessons I've gathered along the way. Let's connect through the love of technology and sports!

  socialIcons:
    - name: mastodon
      url: "https://fosstodon.org/@mikeshootzz"
    - name: linkedin
      url: "https://www.linkedin.com/in/mikeditton/"
    - name: instagram
      url: "https://www.instagram.com/mike_shootzz/"
    - name: gitlab
      url: "https://gitlab.com/mikeditton05"
    - name: github
      url: "https://github.com/mikeshootzz"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: https://github.com/mikeshootzz/blog/blob/main/content
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: About Me
      name: About Me
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: interests
      name: Interests
      url: /interests/
      weight: 30

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
